<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Duel Tracker</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #18181b;
      font-family: Arial, sans-serif;
      color: white;
    }

    body {
      display: flex;
  flex-direction: column;
  align-items: center;
}

    .container {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
}

    .panel {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }

    .player1 {
  transform: rotate(180deg);
  margin-bottom: 200px;
}

.player2 {
  margin-top: 80px;
}

.center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) rotate(90deg) scale(0.62);
}

.sound-panel {
  padding: 0;
  overflow: visible;
  border-radius: 0;

  width: 400px;
  height: 500px;
}

.sound-btn {
  width: 100%;
  height: 100%;

   background: #ca8a04;
  border-radius: 0;
  font-size: 20px;
  font-weight: bold;
}

    .title {
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 4px;
    }

    .lp {
      font-size: 30px;
      font-weight: bold;
      text-align: center;
      margin: 8px 0;
      user-select: none;
      font-variant-numeric: tabular-nums;
    }

    .red {
      color: #60a5fa;
    }

    .blue {
      color: #f87171;
    }

    .buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

    button {
      border: none;
      border-radius: 10px;
      padding: 8px;
      color: white;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:active {
      transform: scale(0.94);
    }

    .red1 {
      background: #dc2626;
    }

    .red2 {
      background: #b91c1c;
    }

    .red3 {
      background: #991b1b;
    }

    .green1 {
      background: #16a34a;
    }

    .green2 {
      background: #15803d;
    }

    .green3 {
      background: #166534;
    }

    .reset {
      width: 50%;
      margin-top: 5px;
      margin-left: 100px;
      background: #7c3aed;
      font-size: 11px;
      padding: 8px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- PLAYER 1 -->
    <div class="panel player1">
      <div class="title">Duelista II</div>

      <div id="lp1" class="lp red">10000</div>

      <div class="buttons">
  <button class="red1" onclick="changeLP(1,-50)">-50</button>
  <button class="red1" onclick="changeLP(1,-100)">-100</button>
  <button class="red2" onclick="changeLP(1,-500)">-500</button>
  <button class="red3" onclick="changeLP(1,-1000)">-1000</button>

  <button class="green1" onclick="changeLP(1,50)">+50</button>
  <button class="green1" onclick="changeLP(1,100)">+100</button>
  <button class="green2" onclick="changeLP(1,500)">+500</button>
  <button class="green3" onclick="changeLP(1,1000)">+1000</button>

</div>
    </div>

    <!-- CENTER -->
    <div class="center">

      <div class="panel sound-panel">
        <button class="sound-btn" onclick="playSound()">
          Sua vez!
        </button>
      </div>

      <button class="reset" onclick="resetDuel()">
        Reset
      </button>

    </div>

    <!-- PLAYER 2 -->
    <div class="panel player2">
      <div class="title">Duelista I</div>

      <div id="lp2" class="lp blue">10000</div>

      <div class="buttons">
  <button class="red1" onclick="changeLP(2,-50)">-50</button>
  <button class="red1" onclick="changeLP(2,-100)">-100</button>
  <button class="red2" onclick="changeLP(2,-500)">-500</button>
  <button class="red3" onclick="changeLP(2,-1000)">-1000</button>

  <button class="green1" onclick="changeLP(2,50)">+50</button>
  <button class="green1" onclick="changeLP(2,100)">+100</button>
  <button class="green2" onclick="changeLP(2,500)">+500</button>
  <button class="green3" onclick="changeLP(2,1000)">+1000</button>

</div>
    </div>
  </div>

  <audio
    id="lpSound"
    src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">
  </audio>

  <audio
    id="buttonSound"
    src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
  </audio>

  <script>
    let player1LP = 10000;
    let player2LP = 10000;

    const lp1 = document.getElementById("lp1");
    const lp2 = document.getElementById("lp2");

    function animateNumber(element, start, end) {
      const duration = 250;
      const startTime = performance.now();

      function update(currentTime) {
        const progress = Math.min((currentTime - startTime) / duration, 1);

        const value = Math.floor(
          start + (end - start) * progress
        );

        element.textContent = value;

        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }

      requestAnimationFrame(update);
    }

    function playLPSound() {
      const sound = document.getElementById("lpSound");
      sound.currentTime = 0;
      sound.play();
    }

    function playSound() {
      const sound = document.getElementById("buttonSound");
      sound.currentTime = 0;
      sound.play();
    }

    function changeLP(player, amount) {
      playLPSound();

      if (player === 1) {
        const old = player1LP;
        player1LP = Math.max(0, player1LP + amount);
        animateNumber(lp1, old, player1LP);
      } else {
        const old = player2LP;
        player2LP = Math.max(0, player2LP + amount);
        animateNumber(lp2, old, player2LP);
      }
    }

    function resetDuel() {
      animateNumber(lp1, player1LP, 10000);
      animateNumber(lp2, player2LP, 10000);

      player1LP = 10000;
      player2LP = 10000;
    }
  </script>
</body>
</html>
